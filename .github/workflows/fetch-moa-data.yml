name: 🥦 每日自動更新 MOA 靜態資料

on:
  # 每天台灣時間 05:00 執行（UTC 21:00 前一天）
  schedule:
    - cron: '0 21 * * *'

  # 允許手動從 GitHub UI 觸發
  workflow_dispatch:

# 給 GITHUB_TOKEN 寫入權限（push commit 需要）
permissions:
  contents: write

jobs:
  fetch-and-commit:
    name: 抓取 MOA 資料並提交
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm install

      - name: 🚀 執行 fetch-moa-data 腳本
        run: npm run fetch-data
        env:
          APP_URL: ${{ secrets.APP_URL }}

      - name: 🔍 檢查資料是否有更新
        id: check_changes
        run: |
          git diff --quiet public/data/ || echo "changed=true" >> $GITHUB_OUTPUT

      - name: 📝 Commit & Push 更新的資料
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/
          git commit -m "chore: 🥦 自動更新 MOA 靜態資料 $(date -u '+%Y-%m-%d')"
          git pull --rebase
          git push

      - name: ✅ 資料無變動，跳過 commit
        if: steps.check_changes.outputs.changed != 'true'
        run: echo "資料與上次相同，無需更新。"

      # 任何步驟失敗時觸發；SLACK_WEBHOOK_URL 未設定則靜默跳過。
      - name: 🚨 Slack 失敗通知
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-type: application/json' \
            --data "{
              \"text\": \"❌ *MOA 資料抓取失敗*\\n倉庫：\`${{ github.repository }}\`\\n觸發：\`${{ github.event_name }}\`\\n詳情：${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"
            }"
