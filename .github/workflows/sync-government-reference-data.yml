name: Sync government reference data

on:
  # Monday 04:30 Asia/Taipei (Sunday 20:30 UTC). Covers monthly origin-price
  # releases while keeping the large nutrition download off the daily workflow.
  schedule:
    - cron: '30 20 * * 0'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Sync official reference datasets
        run: npm run sync-government-data

      - name: Check generated data
        id: changes
        run: |
          git diff --quiet -- src/data/generated/government-reference.json || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit generated data
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/generated/government-reference.json
          git commit -m "Keep government reference data aligned with official sources" \
            -m "Constraint: Generated by scheduled GitHub Actions" \
            -m "Rejected: Runtime downloads | External data must not delay detail pages" \
            -m "Confidence: high" \
            -m "Scope-risk: narrow" \
            -m "Directive: Do not edit generated reference data manually" \
            -m "Tested: npm run sync-government-data" \
            -m "Not-tested: Deployment-specific rendering"
          git pull --rebase --autostash
          git push

      - name: No data changes
        if: steps.changes.outputs.changed != 'true'
        run: echo "Official reference data is unchanged."
